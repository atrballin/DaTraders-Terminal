<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Traders Pro | Industrial Terminal</title>
    <!-- Tailwind for base utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
    <style>
        :root {
            /* Industrial Theme Palette */
            --bg-main: #121212;
            --bg-pane: #1A1C23;
            --bg-header: #1E2129;
            --bg-sidebar: #11141C;
            --border: #2D323E;
            --text: #FAFAFA;
            --header-text: #FFFFFF;
            --accent-blue: #4B91F7;
            --accent-green: #00E676;
            --accent-red: #FF3B30;
            --toast-bg: #FFFFFF;
            --toast-text: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            /* App-like feel */
        }

        .jetbrains {
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- Global Styles --- */
        .glass-panel {
            background: var(--bg-pane);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            /* backdrop-filter: blur(8px); removed for pure industrial feel */
        }

        /* --- Login Animations --- */
        @keyframes pulse-blue {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(75, 145, 247, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(75, 145, 247, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(75, 145, 247, 0);
            }
        }

        .pulse-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            animation: pulse-blue 2s infinite;
            border: 3px solid var(--accent-blue);
            margin-bottom: 30px;
        }

        .glow-text {
            color: #FFF;
            text-shadow: 0 0 10px rgba(75, 145, 247, 0.8);
            font-weight: 900;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            z-index: 50;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-hidden {
            margin-left: -300px;
        }

        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            background: var(--bg-main);
            min-width: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Navigation Items --- */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #888;
            font-weight: 600;
            font-size: 14px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #CCC;
        }

        .nav-item.active {
            background: rgba(75, 145, 247, 0.15);
            color: var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
        }

        /* --- Engine Status Badge --- */
        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(0, 255, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0);
            }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-online {
            background-color: var(--accent-green);
            color: black;
            animation: pulse-green 2s infinite;
        }

        .status-offline {
            background-color: #333;
            color: #888;
        }

        /* --- Data Table --- */
        .dv-table th {
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 12px 16px;
            text-align: left;
        }

        .dv-table td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            font-size: 13px;
        }

        .dv-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* --- Inputs --- */
        .dv-input {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            outline: none;
            width: 100%;
            font-size: 13px;
            font-weight: 500;
        }

        .dv-input:focus {
            border-color: var(--accent-blue);
        }

        /* --- Buttons --- */
        .dv-btn {
            border-radius: 6px;
            font-weight: 600;
            padding: 10px 20px;
            font-size: 13px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .dv-btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #3b7ad9);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(0, 118, 255, 0.39);
        }

        .dv-btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .dv-btn-secondary {
            background: var(--bg-pane);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .dv-btn-secondary:hover {
            background: var(--border);
        }

        .dv-btn-green {
            background: #008000;
            color: white;
            border: 2px solid #00FF00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .dv-btn-red {
            background: #8B0000;
            color: white;
            border: 2px solid #FF0000;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        /* --- Components --- */
        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const getIconSvg = () => {
                if (!window.lucide) return '';
                // Try multiple name formats for Lucide icons (PascalCase is standard in CDN)
                const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                const icon = window.lucide[pascalName] || window.lucide[name] || window.lucide.icons?.[name] || window.lucide.HelpCircle;
                if (!icon || typeof icon.toSvg !== 'function') return '';
                return icon.toSvg({ width: size, height: size, class: className, 'stroke-width': 2 });
            };
            return <span className="inline-flex items-center justify-center align-middle" dangerouslySetInnerHTML={{ __html: getIconSvg() }} />;
        };

        const MetricCard = ({ label, value, subtext, color = "white" }) => (
            <div className="glass-panel p-6 flex flex-col gap-2 hover:-translate-y-1 transition-transform">
                <div className="text-[12px] font-bold text-gray-400 uppercase tracking-wider">{label}</div>
                <div className="text-[32px] font-black leading-none" style={{ color }}>{value}</div>
                <div className="text-[14px] font-semibold text-gray-500">{subtext}</div>
            </div>
        );

        const RiskMeter = ({ symbol, risk }) => {
            const getTrendInfo = () => {
                if (risk === 100) return { color: 'bg-blue-500', label: 'Strong Up', textColor: 'text-blue-500' };
                if (risk === 0) return { color: 'bg-red-500', label: 'Strong Down', textColor: 'text-red-500' };
                return { color: 'bg-gray-500', label: 'Trend...', textColor: 'text-gray-500' };
            };
            const trend = getTrendInfo();

            return (
                <div className="flex items-center justify-between py-3 border-b border-[#333] last:border-0 hover:bg-white/[0.02] px-2 rounded-lg transition-colors">
                    <div className="flex items-center gap-3">
                        <div className={`w-3 h-3 rounded-sm ${trend.color} shadow-[0_0_8px_rgba(0,0,0,0.5)]`}></div>
                        <span className="text-sm font-bold text-gray-200">{symbol}</span>
                    </div>
                    <div className="flex items-center gap-4">
                        <span className={`text-[10px] font-black uppercase tracking-tighter ${trend.textColor} bg-opacity-10 px-2 py-0.5 rounded border border-current`}>
                            {trend.label}
                        </span>
                    </div>
                </div>
            );
        };

        const ScanMonitor = ({ lastScan, isRunning }) => (
            <div className="glass-panel p-6 flex items-center justify-between border-l-4 border-l-[#4B91F7]">
                <div>
                    <div className="text-[12px] font-bold text-gray-400 uppercase tracking-wider mb-1">
                        Algo Engine Status
                    </div>
                    <div className="flex items-center gap-2">
                        <div className={`w-3 h-3 rounded-full ${isRunning ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                        <span className={`text-xl font-black ${isRunning ? 'text-green-500' : 'text-gray-500'}`}>
                            {isRunning ? 'RUNNING' : 'STOPPED'}
                        </span>
                    </div>
                </div>
                <div className="text-right">
                    <div className="text-[10px] uppercase font-bold text-gray-500 mb-1">Last Scan Pulse</div>
                    <div className="text-2xl font-mono text-white tracking-widest">{lastScan || '--:--:--'}</div>
                </div>
            </div>
        );

        const TradingTerminal = ({ symbols, setNotifications, modifyAllPositions, closeAllPositions, bulkMod, setBulkMod, positionsCount }) => {
            const [order, setOrder] = useState({ symbol: symbols[0] || '', volume: 0.1, sl: '', tp: '' });
            const [bulkOrder, setBulkOrder] = useState({ count: 5, delay_ms: 100 });
            const [smartVolume, setSmartVolume] = useState(0.01);
            const [loading, setLoading] = useState(false);
            const [isSmartLoading, setIsSmartLoading] = useState(false);

            // Update symbol if symbols prop changes and current is empty
            useEffect(() => {
                if (!order.symbol && symbols.length > 0) {
                    setOrder(prev => ({ ...prev, symbol: symbols[0] }));
                }
            }, [symbols]);

            // Fetch smart volume when symbol changes
            useEffect(() => {
                if (!order.symbol) return;
                const fetchSmartVol = async () => {
                    setIsSmartLoading(true);
                    try {
                        const r = await fetch(`/api/settings/smart_lot?symbol=${encodeURIComponent(order.symbol)}`);
                        const d = await r.json();
                        if (d.volume) setSmartVolume(d.volume);
                    } catch (e) { console.error(e); }
                    finally { setIsSmartLoading(false); }
                };
                fetchSmartVol();
            }, [order.symbol]);

            const executeTrade = async (type) => {
                if (!order.symbol) {
                    alert("Please select a symbol");
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch('/api/trade/place', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            symbol: order.symbol,
                            order_type: type,
                            volume: Number(order.volume),
                            sl: order.sl ? Number(order.sl) : null,
                            tp: order.tp ? Number(order.tp) : null
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert(`Trade Executed: ${data.message}`);
                    } else {
                        alert(`Execution Failed: ${data.message}`);
                    }
                } catch (e) {
                    alert(`Error: ${e.message}`);
                } finally {
                    setLoading(false);
                }
            };

            const executeBulk = async (type = 'BUY') => {
                if (!order.symbol) {
                    alert("Please select a symbol");
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch('/api/trade/bulk', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ...order,
                            ...bulkOrder,
                            order_type: type,
                            volume: Number(order.volume),
                            sl: order.sl ? Number(order.sl) : null,
                            tp: order.tp ? Number(order.tp) : null
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setNotifications(prev => [{
                            id: Date.now() + Math.random(),
                            type: 'BULK_COMPLETE',
                            reason: data.message,
                            symbol: order.symbol,
                            price: '---'
                        }, ...prev]);
                    } else {
                        alert("Bulk Trade Failed: " + (data.last_error || data.message));
                    }
                } catch (e) {
                    alert(`Error: ${e.message}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-in max-w-5xl mx-auto">
                    {/* Order Entry */}
                    <div className="glass-panel p-8 text-left">
                        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-[#333]">
                            <LucideIcon name="zap" size={24} className="text-[#4B91F7]" />
                            <h3 className="text-lg font-bold text-white">Direct Execution</h3>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Instrument</label>
                                <select
                                    className="dv-input text-lg font-bold text-white w-full uppercase bg-[#1A1C23] cursor-pointer"
                                    value={order.symbol}
                                    onChange={e => setOrder({ ...order, symbol: e.target.value })}
                                >
                                    <option value="" disabled>SELECT SYMBOL</option>
                                    {symbols?.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Volume (Lots)</label>
                                <div className="relative">
                                    <input
                                        type="text"
                                        readOnly
                                        className={`dv-input text-2xl font-black w-full bg-[#121212] ${isSmartLoading ? 'animate-pulse text-gray-700' : 'text-[#4B91F7]'}`}
                                        value={isSmartLoading ? '...' : smartVolume.toFixed(2)}
                                    />
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] bg-[#4B91F7]/20 text-[#4B91F7] px-2 py-1 rounded font-bold border border-[#4B91F7]/30">
                                        LOCKED
                                    </div>
                                </div>
                                <p className="text-[9px] text-gray-600 mt-1 uppercase">Managed by engine (Balance-Based)</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Stop Loss</label>
                                    <input
                                        type="number" step="0.01"
                                        className="dv-input text-white w-full"
                                        value={order.sl}
                                        onChange={e => setOrder({ ...order, sl: e.target.value })}
                                        placeholder="Price (Opt)"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Take Profit</label>
                                    <input
                                        type="number" step="0.01"
                                        className="dv-input text-white w-full"
                                        value={order.tp}
                                        onChange={e => setOrder({ ...order, tp: e.target.value })}
                                        placeholder="Price (Opt)"
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 pt-4">
                                <button
                                    onClick={() => executeTrade('SELL')}
                                    disabled={loading}
                                    className="dv-btn bg-red-600 hover:bg-red-500 text-white py-4 rounded-xl flex flex-col items-center justify-center transition-transform active:scale-95 disabled:opacity-50"
                                >
                                    <span className="text-2xl font-black mb-1 text-white">SELL</span>
                                    <span className="text-[10px] font-bold opacity-75">AT MARKET</span>
                                </button>
                                <button
                                    onClick={() => executeTrade('BUY')}
                                    disabled={loading}
                                    className="dv-btn bg-green-600 hover:bg-green-500 text-white py-4 rounded-xl flex flex-col items-center justify-center transition-transform active:scale-95 disabled:opacity-50"
                                >
                                    <span className="text-2xl font-black mb-1 text-white">BUY</span>
                                    <span className="text-[10px] font-bold opacity-75">AT MARKET</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Bulk Execution Mode */}
                    <div className="glass-panel p-8 text-left">
                        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-[#333]">
                            <LucideIcon name="flame" size={24} className="text-orange-500" />
                            <h3 className="text-lg font-bold text-white">Bulk Execution</h3>
                        </div>

                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Trade Count</label>
                                    <input
                                        type="number"
                                        className="dv-input text-white w-full"
                                        value={bulkOrder.count}
                                        onChange={e => setBulkOrder({ ...bulkOrder, count: parseInt(e.target.value) || 0 })}
                                        min="1" max="50"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Delay (ms)</label>
                                    <input
                                        type="number"
                                        className="dv-input text-white w-full"
                                        value={bulkOrder.delay_ms}
                                        onChange={e => setBulkOrder({ ...bulkOrder, delay_ms: parseInt(e.target.value) || 0 })}
                                        min="0" step="100"
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <button
                                    onClick={() => executeBulk('BUY')}
                                    disabled={loading}
                                    className="dv-btn w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-xl flex flex-col items-center justify-center transition-transform active:scale-95 disabled:opacity-50"
                                >
                                    <span className="text-xl font-black mb-1 text-white">BULK BUY</span>
                                    <span className="text-[10px] font-bold opacity-75 uppercase">{bulkOrder.count} ORDERS</span>
                                </button>
                                <button
                                    onClick={() => executeBulk('SELL')}
                                    disabled={loading}
                                    className="dv-btn w-full bg-red-800 hover:bg-red-700 text-white py-4 rounded-xl flex flex-col items-center justify-center transition-transform active:scale-95 disabled:opacity-50"
                                >
                                    <span className="text-xl font-black mb-1 text-white">BULK SELL</span>
                                    <span className="text-[10px] font-bold opacity-75 uppercase">{bulkOrder.count} ORDERS</span>
                                </button>
                            </div>

                            <p className="text-[10px] text-gray-600 text-center uppercase tracking-widest mt-4">
                                Delay: {bulkOrder.delay_ms}ms | Total Vol: {(Number(smartVolume) * (bulkOrder.count || 0)).toFixed(2)}
                            </p>
                        </div>
                    </div>

                    {/* Bulk Modification Control (Moved from Dashboard) */}
                    {positionsCount > 0 && (
                        <div className="md:col-span-2 mt-4 glass-panel p-8 text-left border-t-4 border-[#00E676]">
                            <div className="flex items-center justify-between mb-6 pb-4 border-b border-[#333]">
                                <div className="flex items-center gap-3">
                                    <LucideIcon name="sliders" size={24} className="text-[#00E676]" />
                                    <h3 className="text-lg font-bold text-white">Bulk Modification</h3>
                                </div>
                                <button
                                    onClick={closeAllPositions}
                                    className="dv-btn bg-red-900/40 border border-red-700/50 text-red-200 hover:bg-red-800 px-6 py-2 rounded-lg text-xs font-bold transition-all"
                                >
                                    💀 CLOSE ALL {positionsCount} POSITIONS
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 items-end">
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Universal Stop Loss</label>
                                    <input
                                        type="number" step="0.01"
                                        className="dv-input text-white w-full"
                                        value={bulkMod.sl}
                                        onChange={e => setBulkMod({ ...bulkMod, sl: e.target.value })}
                                        placeholder="New SL Price"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Universal Take Profit</label>
                                    <input
                                        type="number" step="0.01"
                                        className="dv-input text-white w-full"
                                        value={bulkMod.tp}
                                        onChange={e => setBulkMod({ ...bulkMod, tp: e.target.value })}
                                        placeholder="New TP Price"
                                    />
                                </div>
                                <button
                                    onClick={() => modifyAllPositions(bulkMod.sl, bulkMod.tp)}
                                    className="dv-btn bg-[#00E676] hover:bg-[#00C853] text-black py-4 rounded-xl font-black tracking-widest uppercase transition-all active:scale-95 shadow-[0_0_20px_rgba(0,230,118,0.2)]"
                                >
                                    ⚡ SYNC ALL OPEN TRADES
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChartSection = ({ symbols }) => {
            const chartContainerRef = useRef(null);
            const chartInstanceRef = useRef(null);
            const [selectedSymbol, setSelectedSymbol] = useState(symbols[0] || '');
            const [timeframe, setTimeframe] = useState('M5');
            const [chartError, setChartError] = useState(null);
            const [loading, setLoading] = useState(true);

            // Update default symbol when symbols list loads
            useEffect(() => {
                if (symbols.length > 0 && !selectedSymbol) {
                    setSelectedSymbol(symbols[0]);
                }
            }, [symbols]);

            // Save/Restore local storage keys
            const getStorageKey = () => `dv_drawings_${selectedSymbol}_${timeframe}`;

            const saveDrawings = () => {
                const chart = chartInstanceRef.current;
                if (!chart) return;
                const overlays = chart.getOverlayRendered();
                localStorage.setItem(getStorageKey(), JSON.stringify(overlays));
            };

            const loadDrawings = (chart) => {
                const saved = localStorage.getItem(getStorageKey());
                if (!saved) return;
                try {
                    const parsed = JSON.parse(saved);
                    parsed.forEach(overlay => chart.createOverlay(overlay));
                } catch (e) {
                    console.error("Failed to load drawings", e);
                }
            };

            // Initialize chart
            useEffect(() => {
                if (!chartContainerRef.current) return;

                // Clean up any previous chart
                if (chartInstanceRef.current) {
                    try { saveDrawings(); klinecharts.dispose(chartContainerRef.current); } catch (e) { }
                    chartInstanceRef.current = null;
                }

                try {
                    const container = chartContainerRef.current;
                    const chart = klinecharts.init(container);

                    chart.setStyles({
                        grid: {
                            horizontal: { color: 'rgba(45, 50, 62, 0.5)' },
                            vertical: { color: 'rgba(45, 50, 62, 0.5)' }
                        },
                        candle: {
                            bar: {
                                upColor: '#26a69a',
                                downColor: '#ef5350',
                                noChangeColor: '#888888',
                                upBorderColor: '#26a69a',
                                downBorderColor: '#ef5350',
                                noChangeBorderColor: '#888888',
                                upWickColor: '#26a69a',
                                downWickColor: '#ef5350',
                                noChangeWickColor: '#888888'
                            }
                        },
                        xAxis: { tickText: { color: '#D9D9D9' }, axisLine: { color: '#2D323E' } },
                        yAxis: { tickText: { color: '#D9D9D9' }, axisLine: { color: '#2D323E' } }
                    });

                    chartInstanceRef.current = chart;
                    setChartError(null);

                    // Load previous drawings
                    loadDrawings(chart);

                    // Use ResizeObserver for reliable auto-sizing
                    const resizeObserver = new ResizeObserver(entries => {
                        for (const entry of entries) {
                            const { width, height } = entry.contentRect;
                            if (width > 0 && height > 0) {
                                chart.resize();
                            }
                        }
                    });
                    resizeObserver.observe(container);

                    // Save drawings periodically
                    const autoSaveIntevral = setInterval(saveDrawings, 5000);

                    return () => {
                        clearInterval(autoSaveIntevral);
                        resizeObserver.disconnect();
                        try { saveDrawings(); klinecharts.dispose(container); } catch (e) { }
                        chartInstanceRef.current = null;
                    };
                } catch (err) {
                    console.error('Chart Init Error:', err);
                    setChartError('Failed to initialize chart: ' + err.message);
                }
            }, [selectedSymbol, timeframe]);

            // Helper to transform our backend MT5 data to KlineCharts format
            const transformToKlineData = (bars) => {
                return (Array.isArray(bars) ? bars : []).map(b => ({
                    timestamp: b.time * 1000,
                    open: b.open,
                    high: b.high,
                    low: b.low,
                    close: b.close,
                    volume: b.volume || 0
                }));
            };

            // Fetch chart data and handle WebSocket updates
            useEffect(() => {
                if (!selectedSymbol || !chartInstanceRef.current) return;
                let cancelled = false;

                const loadChart = async () => {
                    setLoading(true);
                    try {
                        const cleanSymbol = selectedSymbol.trim();
                        const url = `/api/chart/data?symbol=${encodeURIComponent(cleanSymbol)}&timeframe=${timeframe}&count=1500&offset=0`;
                        const res = await fetch(url);
                        const result = await res.json();
                        const bars = result.data || result;

                        if (cancelled || !chartInstanceRef.current) return;

                        const barsArr = Array.isArray(bars) ? bars : (bars.data || []);

                        if (barsArr.length === 0) {
                            console.warn("No data returned for", cleanSymbol);
                            setChartError(`No available history for ${cleanSymbol} (${timeframe})`);
                        } else {
                            const klineData = transformToKlineData(barsArr);
                            chartInstanceRef.current.applyNewData(klineData);
                            setChartError(null);
                        }
                    } catch (e) {
                        console.error('Chart Load Error:', e);
                        setChartError('Data synchronization failed.');
                    } finally {
                        if (!cancelled) setLoading(false);
                    }
                };

                loadChart();

                // WebSocket live updates handler
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/api/chart/ws`;
                const socket = new WebSocket(wsUrl);

                socket.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'CHART_UPDATE' && 
                            msg.symbol === selectedSymbol && 
                            msg.timeframe === timeframe) {
                            
                            const klineCandle = transformToKlineData([msg.candle])[0];
                            if (chartInstanceRef.current) {
                                chartInstanceRef.current.updateData(klineCandle);
                            }
                        }
                    } catch (e) { /* silent */ }
                };

                socket.onerror = (e) => console.error("Chart WS Error:", e);

                return () => { 
                    cancelled = true; 
                    socket.close();
                };
            }, [selectedSymbol, timeframe]);

            // --- Drawing Toolbar Actions ---
            const addDrawingTool = (name) => {
                if (chartInstanceRef.current) {
                    chartInstanceRef.current.createOverlay(name);
                }
            };
            const clearDrawings = () => {
                if (chartInstanceRef.current) {
                    chartInstanceRef.current.removeOverlay();
                    localStorage.removeItem(getStorageKey());
                }
            };

            return (
                <div className="animate-fade-in" style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 92px)' }}>
                    {/* Header Bar */}
                    <div className="flex items-center justify-between bg-[#111] p-3 rounded border border-[#2D323E]">
                        <div className="flex items-center gap-4">
                            <LucideIcon name="activity" size={24} className="text-[#4B91F7]" />
                            <select
                                className="dv-input text-xl font-black tracking-widest bg-transparent border-none text-white uppercase outline-none focus:ring-0 cursor-pointer p-0"
                                value={selectedSymbol}
                                onChange={e => setSelectedSymbol(e.target.value)}
                                style={{ width: 'auto' }}
                            >
                                <option value="" disabled>SELECT ASSET</option>
                                {(symbols || []).map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                            <div className="h-6 w-px bg-[#333]"></div>
                            <button
                                onClick={() => window.location.reload()}
                                className="text-[#333] hover:text-[#00E676] transition-colors"
                                title="Force Refresh Symbols"
                            >
                                <LucideIcon name="rotate-cw" size={14} />
                            </button>
                            {loading && <div className="text-[10px] text-[#00E676] animate-pulse font-bold tracking-widest break-all">STREAMING...</div>}
                        </div>

                        {/* Drawing Toolbar */}
                        <div className="flex items-center gap-2 bg-[#1A1C23] p-1.5 rounded-lg border border-[#2D323E]">
                            <button title="Trend Line" onClick={() => addDrawingTool('trendLine')} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors"><LucideIcon name="minus" size={16} style={{ transform: 'rotate(-45deg)' }} /></button>
                            <button title="Horizontal Line" onClick={() => addDrawingTool('horizontalLine')} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors"><LucideIcon name="minus" size={16} /></button>
                            <button title="Fibonacci" onClick={() => addDrawingTool('fibonacciLine')} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors"><LucideIcon name="align-justify" size={16} /></button>
                            <button title="Rectangle" onClick={() => addDrawingTool('rect')} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors"><LucideIcon name="square" size={16} /></button>
                            <button title="Text" onClick={() => addDrawingTool('text')} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors"><LucideIcon name="type" size={16} /></button>
                            <div className="h-4 w-px bg-[#444] mx-1"></div>
                            <button title="Clear All Drawings" onClick={clearDrawings} className="p-1.5 text-red-400 hover:text-red-300 hover:bg-red-900/30 rounded transition-colors"><LucideIcon name="trash-2" size={16} /></button>
                        </div>

                        <div className="flex items-center gap-2">
                            <select
                                className="dv-input font-bold bg-[#121212] border-[#2D323E] text-sm"
                                style={{ minWidth: '80px' }}
                                value={timeframe}
                                onChange={e => setTimeframe(e.target.value)}
                            >
                                {['M1', 'M5', 'M15', 'M30', 'H1', 'H4', 'D1'].map(tf => (
                                    <option key={tf} value={tf}>{tf}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {/* Chart Container - fills remaining space */}
                    <div className="glass-panel overflow-hidden mt-4" style={{ flex: 1, minHeight: 0, position: 'relative' }}>
                        {chartError ? (
                            <div className="flex items-center justify-center h-full text-red-400 text-sm font-bold">
                                {chartError}
                            </div>
                        ) : (
                            <div ref={chartContainerRef} style={{ width: '100%', height: '100%' }} />
                        )}
                    </div>
                </div>
            );
        };

        /* --- Error Boundary --- */
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Boundary Caught:", error, errorInfo);
                this.setState({ errorInfo });
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '50px', background: '#220000', color: 'white', minHeight: '100vh' }}>
                            <h1 style={{ color: '#ff5555' }}>Something went wrong.</h1>
                            <pre style={{ color: '#ffaaaa', overflow: 'auto' }}>{this.state.error && this.state.error.toString()}</pre>
                            <br />
                            <pre style={{ fontSize: '12px', color: '#888888', overflow: 'auto' }}>{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        /* --- Main App --- */
        const App = () => {
            const [authState, setAuthState] = useState({
                authenticated: false,
                step: 'SCAN',
                email: '',
                discordUser: localStorage.getItem('discordUser') || '',
                token: null,
                otp: ''
            });

            const [activeTab, setActiveTab] = useState('DASHBOARD');
            const [data, setData] = useState({
                account: { balance: 0, equity: 0, profit: 0, login: 0, company: '---' },
                status: { running: false, symbols: [] },
                positions: [],
                settings: null,
                logs: [],
                news: [],
                calendar: [],
                scanResults: { signals: {}, last_scan: null },
                allSymbols: []
            });
            const [notifications, setNotifications] = useState([]);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [bulkMod, setBulkMod] = useState({ sl: '', tp: '' });

            // --- Data Fetching ---
            const fetchData = useCallback(async () => {
                if (!authState.authenticated) return;
                try {
                    const endpoints = [
                        { key: 'account', url: '/api/account', default: { balance: 0, equity: 0, profit: 0, login: 0, company: '---' } },
                        { key: 'status', url: '/api/status', default: { running: false, symbols: [], mt5_connected: false } },
                        { key: 'positions', url: '/api/positions', default: [] },
                        { key: 'settings', url: '/api/settings', default: null },
                        { key: 'logs', url: '/api/logs', default: [] },
                        { key: 'news', url: '/api/news/live', default: [] },
                        { key: 'calendar', url: '/api/news/calendar', default: [] },
                        { key: 'notifications', url: '/api/notifications', default: [] },
                        { key: 'scanResults', url: '/api/scan_results', default: { signals: {}, last_scan: null } },
                        { key: 'allSymbols', url: '/api/symbols', default: [] }
                    ];

                    const results = await Promise.all(endpoints.map(async (ep) => {
                        try {
                            const res = await fetch(ep.url);
                            if (!res.ok) return { key: ep.key, data: null };
                            const data = await res.json();
                            return { key: ep.key, data };
                        } catch (e) {
                            return { key: ep.key, data: null };
                        }
                    }));

                    const newData = { ...data };
                    let newNotes = [];

                    results.forEach(res => {
                        if (res.data !== null) {
                            if (res.key === 'notifications') {
                                newNotes = res.data;
                            } else {
                                newData[res.key] = res.data;
                            }
                        }
                    });

                    setData(newData);

                    if (newNotes.length > 0) {
                        const notesWithIds = newNotes.map(n => ({
                            ...n,
                            id: n.id || (Date.now() + Math.random())
                        }));
                        setNotifications(prev => [...notesWithIds, ...prev].slice(0, 8));

                        notesWithIds.forEach(n => {
                            if (n.sound) new Audio('/' + n.sound).play().catch(() => { });
                        });
                    }
                } catch (e) { console.error("Poll error", e); }
            }, [authState.authenticated, data]);

            useEffect(() => {
                const interval = setInterval(fetchData, 2000); // 2s polling
                return () => clearInterval(interval);
            }, [fetchData]);

            // --- Centralized Notification Auto-Dismiss ---
            useEffect(() => {
                if (notifications.length > 0) {
                    const timer = setTimeout(() => {
                        // Dismiss the oldest notification after 8 seconds
                        setNotifications(prev => prev.slice(0, -1));
                    }, 8000);
                    return () => clearTimeout(timer);
                }
            }, [notifications]);

            // --- Lightweight MT5 status poll (runs even before auth) ---
            useEffect(() => {
                const pollMT5 = async () => {
                    try {
                        const stat = await fetch('/api/status').then(r => r.json());
                        setData(prev => ({ ...prev, status: { ...prev.status, mt5_connected: stat.mt5_connected, engine_version: stat.engine_version } }));
                    } catch (e) { }
                };
                pollMT5(); // immediate first call
                const mt5Interval = setInterval(pollMT5, 3000);
                return () => clearInterval(mt5Interval);
            }, []);

            // --- Session Token Validation on Startup ---
            // REMOVED: Token auto-resume is disabled.
            // Full security flow (USB → Discord → OTP) is always enforced.

            // --- Authentication Logic ---
            useEffect(() => {
                if (authState.step === 'SCAN') {
                    const scanInt = setInterval(async () => {
                        try {
                            const res = await fetch('/api/auth/scan', { method: 'POST' });
                            const json = await res.json();
                            if (json.success) {
                                setAuthState(prev => ({ ...prev, email: json.email, step: 'DISCORD' }));
                                clearInterval(scanInt);
                            }
                        } catch (e) { }
                    }, 2000);
                    return () => clearInterval(scanInt);
                }
            }, [authState.step]);


            const [isLoading, setIsLoading] = useState(false);

            const verifyDiscord = async () => {
                if (isLoading) return;
                setIsLoading(true);
                try {
                    const res = await fetch('/api/auth/verify_discord', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: authState.email,
                            discord_username: authState.discordUser,
                            token: authState.token
                        })
                    });

                    if (!res.ok) {
                        throw new Error(`Server returned ${res.status}: ${res.statusText}`);
                    }

                    const json = await res.json();
                    if (json.success) {
                        // This handles the "Not a Fresh Login" case (token was valid)
                        setAuthState({ ...authState, authenticated: true, step: 'COMPLETE', token: json.token });
                        localStorage.setItem('token', json.token);
                        localStorage.setItem('email', json.email);
                        localStorage.setItem('discordUser', authState.discordUser);
                    } else if (json.otp_required) {
                        // Transition to OTP step
                        setAuthState({ ...authState, step: 'OTP' });
                    } else {
                        alert("Verification Failed: " + json.message);
                    }
                } catch (e) {
                    alert("System Error during verification: " + e.message);
                    console.error(e);
                } finally {
                    setIsLoading(false);
                }
            };

            const verifyOTP = async () => {
                if (isLoading || !authState.otp) return;
                setIsLoading(true);
                try {
                    const res = await fetch('/api/auth/verify_otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: authState.email,
                            discord_username: authState.discordUser,
                            otp: authState.otp
                        })
                    });
                    const json = await res.json();
                    if (json.success) {
                        setAuthState({ ...authState, authenticated: true, step: 'COMPLETE', token: json.token });
                        localStorage.setItem('token', json.token);
                        localStorage.setItem('email', json.email);
                        localStorage.setItem('discordUser', authState.discordUser);
                    } else {
                        alert("OTP Error: " + json.message);
                    }
                } catch (e) {
                    alert("OTP System Error: " + e.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const reverifyMT5 = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch('/api/mt5/reconnect', { method: 'POST' });
                    const json = await res.json();
                    if (json.success) {
                        setNotifications(prev => [{
                            id: Date.now(),
                            type: 'AUTH_SUCCESS',
                            reason: `MT5 Reconnected: ${json.message}`,
                            symbol: 'SYSTEM',
                            price: '---'
                        }, ...prev]);
                    } else {
                        setNotifications(prev => [{
                            id: Date.now(),
                            type: 'AUTH_FAILED',
                            reason: `MT5 Reconnect Failed: ${json.message}`,
                            symbol: 'SYSTEM',
                            price: '---'
                        }, ...prev]);
                    }
                } catch (e) {
                    console.error("MT5 Reconnect error", e);
                    setNotifications(prev => [{
                        id: Date.now(),
                        type: 'AUTH_FAILED',
                        reason: `Connection Error: ${e.message}`,
                        symbol: 'SYSTEM',
                        price: '---'
                    }, ...prev]);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- Actions ---
            const toggleEngine = async () => {
                const endpoint = data.status.running ? '/api/engine/stop' : '/api/engine/start';
                await fetch(endpoint, { method: 'POST' });
                fetchData();
            };

            const updateSettings = async (newSet) => {
                // Optimistic UI update
                setData(d => ({ ...d, settings: newSet }));
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newSet)
                });
                fetchData(); // Refresh to confirm
            };

            const closePosition = async (ticket) => {
                await fetch(`/api/trade/close?ticket=${ticket}`, { method: 'POST' });
                fetchData();
            };

            const closeAllPositions = async () => {
                for (let p of data.positions) {
                    await closePosition(p.ticket);
                }
            };

            const modifyAllPositions = async (sl, tp) => {
                try {
                    const res = await fetch('/api/trade/modify_all', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sl: Number(sl), tp: Number(tp) })
                    });
                    const d = await res.json();
                    if (d.success) {
                        setNotifications(prev => [{
                            id: Date.now() + Math.random(),
                            type: 'MOD_COMPLETE',
                            reason: d.message,
                            symbol: 'ALL',
                            price: '---'
                        }, ...prev]);
                    } else {
                        alert("Bulk Modification Failed: " + d.message);
                    }
                } catch (e) {
                    alert("Error: " + e.message);
                } finally {
                    fetchData();
                }
            };

            // --- Render: Login Screen ---
            if (!authState.authenticated) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen w-full bg-[#121212]">
                        <div className="text-center mb-10">
                            <h1 className="text-[42px] font-black glow-text mb-0 tracking-tight">ATLASPRIME</h1>
                            <div className="text-[11px] font-extrabold text-[#4B91F7] tracking-[8px] mt-0 ml-1">SECURE GATEWAY</div>
                        </div>

                        <div className="pulse-circle" style={{ backgroundImage: "url('/assets/logo_dark.jpg')" }}></div>

                        <div className="text-[14px] font-bold text-[#4B91F7] tracking-[3px] animate-pulse uppercase mb-8">
                            {authState.step === 'SCAN' ? 'Insert Security Key' : 'Key Verified'}
                        </div>

                        {authState.step === 'SCAN' && (
                            <div className="text-center text-gray-500 text-xs font-bold animate-bounce">
                                📡 SCANNING HARDWARE PORTS...
                            </div>
                        )}

                        {authState.step === 'DISCORD' && (
                            <div className="w-[300px] bg-[#1A1C23] p-6 rounded-xl border border-[#333] shadow-2xl animate-fade-in-up">
                                <div className="text-xs font-bold text-green-400 mb-4 flex items-center gap-2">
                                    <LucideIcon name="check-circle" size={14} /> KEY BINDING: {authState.email}
                                </div>
                                <label className="text-[10px] text-gray-500 font-bold uppercase mb-1 block">Discord Identity</label>
                                <input
                                    type="text"
                                    className="dv-input mb-4"
                                    placeholder="Enter username"
                                    value={authState.discordUser}
                                    onChange={e => setAuthState({ ...authState, discordUser: e.target.value })}
                                />
                                <button
                                    className={`dv-btn dv-btn-primary w-full ${isLoading ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    onClick={verifyDiscord}
                                    disabled={isLoading}
                                >
                                    {isLoading ? 'VERIFYING...' : 'VERIFY MEMBERSHIP'}
                                </button>
                            </div>
                        )}

                        {authState.step === 'OTP' && (
                            <div className="w-[300px] bg-[#1A1C23] p-6 rounded-xl border border-[#333] shadow-2xl animate-fade-in-up">
                                <div className="text-xs font-bold text-blue-400 mb-4 flex items-center gap-2">
                                    <LucideIcon name="lock" size={14} /> 2FA VERIFICATION
                                </div>
                                <p className="text-[10px] text-gray-400 mb-4 uppercase">
                                    A 6-digit code has been sent to your Discord DMs. It expires in 3 minutes.
                                </p>
                                <label className="text-[10px] text-gray-400 font-bold uppercase mb-1 block">One-Time Password</label>
                                <input
                                    type="text"
                                    className="dv-input mb-4 text-center text-xl tracking-[10px] font-black"
                                    placeholder="000000"
                                    maxLength={6}
                                    value={authState.otp}
                                    onChange={e => setAuthState({ ...authState, otp: e.target.value })}
                                />
                                <button
                                    className={`dv-btn dv-btn-primary w-full ${isLoading ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    onClick={verifyOTP}
                                    disabled={isLoading || authState.otp.length < 6}
                                >
                                    {isLoading ? 'VERIFYING...' : 'LOGIN TO TERMINAL'}
                                </button>
                                <button
                                    className="w-full mt-4 text-[10px] text-gray-500 hover:text-gray-300 font-bold uppercase transition-colors"
                                    onClick={() => setAuthState({ ...authState, step: 'DISCORD', otp: '' })}
                                >
                                    ← BACK TO DISCORD
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            // --- Render: Main Dashboard ---
            return (
                <div className="flex h-screen w-full text-white overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`sidebar ${!sidebarOpen ? 'sidebar-hidden' : ''}`}>
                        <div className="flex justify-center mb-8 relative">
                            <img src="/assets/logo_dark.jpg" className="w-[120px] h-[120px] rounded-full object-cover border-4 border-[#1E2129]" />
                        </div>

                        <nav className="flex-1 overflow-y-auto">
                            {[
                                { id: 'DASHBOARD', label: 'Dashboard', icon: 'layout-dashboard' },
                                { id: 'TRADING', label: 'Trading', icon: 'line-chart' },
                                { id: 'CHARTS', label: 'Charts', icon: 'bar-chart-3' },
                                { id: 'NEWS', label: 'News', icon: 'globe' },
                                { id: 'CALENDAR', label: 'Calendar', icon: 'calendar-days' },
                                { id: 'ALGO', label: 'AtlasPrime', icon: 'cpu' },
                            ]?.map(tab => (
                                <div
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`nav-item ${activeTab === tab.id ? 'active' : ''}`}
                                >
                                    <LucideIcon name={tab.icon} size={18} />
                                    <span>{tab.label}</span>
                                </div>
                            ))}
                        </nav>

                        <div className="mt-auto border-t border-[#333] pt-6">
                            <div className="text-[10px] uppercase font-bold text-gray-500 mb-2">System Status</div>
                            <div className="flex items-center justify-between bg-[#1A1C23] p-3 rounded-lg border border-[#333]">
                                <div className="text-xs font-bold text-gray-300">MetaTrader 5</div>
                                <div className={`text-[10px] font-bold ${data.status?.mt5_connected ? 'text-green-400' : 'text-red-500 animate-pulse'}`}>
                                    {data.status?.mt5_connected ? 'ONLINE' : 'OFFLINE'}
                                </div>
                            </div>
                            <div className="mt-2 text-[10px] text-gray-600 font-mono text-center">v{data.status?.engine_version || '1.0'}</div>

                            <button
                                onClick={reverifyMT5}
                                disabled={isLoading}
                                className="mt-4 w-full dv-btn dv-btn-secondary py-2 text-[10px] font-bold tracking-widest uppercase flex items-center justify-center gap-2 hover:bg-[#2D323E]"
                            >
                                <LucideIcon name="refresh-cw" size={12} />
                                {isLoading ? 'CONNECTING...' : 'RECONNECT MT5'}
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="main-content">
                        {/* Header */}
                        <header className="h-[60px] bg-[#1E2129] border-b border-[#2D323E] flex items-center px-8 sticky top-0 z-40 shadow-sm justify-between">
                            <div className="flex items-center gap-6">
                                <button
                                    onClick={() => setSidebarOpen(!sidebarOpen)}
                                    className="text-gray-400 hover:text-white transition-colors"
                                    title={sidebarOpen ? "Hide Sidebar" : "Show Sidebar"}
                                >
                                    <LucideIcon name={sidebarOpen ? "indent-decrease" : "indent-increase"} size={22} />
                                </button>
                                <div className="flex items-center gap-3 text-white font-bold text-lg tracking-tight">
                                    <LucideIcon name="zap" size={20} className="text-[#FAFAFA]" />
                                    DA TRADERS TERMINAL <span className="opacity-50 text-sm font-normal ml-1">PRO</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-xs font-semibold text-gray-400">User: <span className="text-gray-200">{authState.email}</span></div>
                            </div>
                        </header>

                        {/* Views */}
                        <div className="p-8 max-w-7xl mx-auto">
                            {activeTab === 'DASHBOARD' && (
                                <div className="space-y-8 animate-fade-in">
                                    <h2 className="text-2xl font-bold text-white mb-6">📊 Account Overview</h2>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <MetricCard
                                            label="Account Balance"
                                            value={`$${data.account.balance?.toLocaleString('en-US', { minimumFractionDigits: 2 })}`}
                                            subtext={`Equity: $${data.account.equity?.toLocaleString('en-US', { minimumFractionDigits: 2 })}`}
                                        />
                                        <MetricCard
                                            label="Trade Efficiency"
                                            value={`${(data.positions || []).length > 0 ? "OPTIMAL" : "STABLE"}`}
                                            subtext="📊 Real-time Monitoring"
                                        />
                                        <MetricCard
                                            label="Running Profit"
                                            value={`$${data.account.profit?.toLocaleString('en-US', { minimumFractionDigits: 2 })}`}
                                            subtext={data.account.profit >= 0 ? "🟢 Float Profit" : "⚡ Float Drawdown"}
                                            color={data.account.profit >= 0 ? "#00E676" : "#FF3B30"}
                                        />
                                    </div>

                                    {/* Engine Status Pulse */}
                                    <ScanMonitor
                                        lastScan={data.status.last_scan_time}
                                        isRunning={data.status.running}
                                    />

                                    <div className="glass-panel overflow-hidden h-[500px] flex flex-col mt-8">
                                        <div className="p-5 border-b border-[#2D323E] flex justify-between items-center bg-[#1c202a]">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                                <h3 className="font-bold text-gray-200 uppercase tracking-widest text-xs">Atlas Engine Monitor</h3>
                                            </div>
                                            <div className="flex gap-6 text-[9px] font-bold uppercase tracking-[2px]">
                                                <span className="text-blue-400">Active Positions</span>
                                                <span className="text-gray-500">Scanning Stream</span>
                                            </div>
                                        </div>

                                        <div className="flex flex-1 overflow-hidden divide-x divide-[#2D323E]">
                                            {/* LEFT: Active Trades */}
                                            <div className="flex-1 p-5 overflow-y-auto">
                                                <div className="text-[10px] text-gray-500 font-bold uppercase mb-4 opacity-50 flex justify-between items-center">
                                                    <span>Currently Managing</span>
                                                    <span className="bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20">
                                                        {(data.positions || []).length} TRADES
                                                    </span>
                                                </div>

                                                {Object.entries(data.status.spike_risk || {}).filter(([sym]) => (data.positions || []).some(p => p.symbol === sym)).length > 0 ? (
                                                    Object.entries(data.status.spike_risk).filter(([sym]) => (data.positions || []).some(p => p.symbol === sym)).map(([sym, risk]) => (
                                                        <RiskMeter key={sym} symbol={sym} risk={risk} />
                                                    ))
                                                ) : (
                                                    <div className="text-center py-20">
                                                        <div className="text-gray-600 italic text-sm">No active positions</div>
                                                        <div className="text-[10px] text-gray-700 uppercase mt-2 tracking-tighter">Waiting for algorithm execution...</div>
                                                    </div>
                                                )}
                                            </div>

                                            {/* RIGHT: Full Scanner Stream */}
                                            <div className="flex-1 p-5 overflow-y-auto bg-black/10">
                                                <div className="text-[10px] text-gray-500 font-bold uppercase mb-4 opacity-50 flex justify-between items-center">
                                                    <span>Market Pulse (MT5 Stream)</span>
                                                    <span className="bg-gray-800 text-gray-400 px-2 py-0.5 rounded border border-gray-700">
                                                        {Object.keys(data.status.spike_risk || {}).length} SYMBOLS
                                                    </span>
                                                </div>

                                                {Object.entries(data.status.spike_risk || {}).length > 0 ? (
                                                    Object.entries(data.status.spike_risk).map(([sym, risk]) => (
                                                        <RiskMeter key={sym} symbol={sym} risk={risk} />
                                                    ))
                                                ) : (
                                                    <div className="text-center py-20 text-gray-700 italic text-sm">
                                                        Engine initializing sensor stream...
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {(data.positions?.length || 0) > 0 && (
                                        <div className="mt-8 flex justify-center">
                                            <div className="px-6 py-3 bg-green-500/10 border border-green-500/20 rounded-full flex items-center gap-3">
                                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                                                <span className="text-xs font-bold text-green-400 uppercase tracking-widest">
                                                    {(data.positions?.length || 0)} Active Positions Under Management
                                                </span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'TRADING' && (
                                <TradingTerminal
                                    symbols={data.allSymbols || []}
                                    setNotifications={setNotifications}
                                    modifyAllPositions={modifyAllPositions}
                                    closeAllPositions={closeAllPositions}
                                    bulkMod={bulkMod}
                                    setBulkMod={setBulkMod}
                                    positionsCount={data.positions.length}
                                />
                            )}

                            {activeTab === 'CHARTS' && (
                                <ChartSection symbols={data.allSymbols || []} />
                            )}

                            {activeTab === 'ALGO' && data.settings && (
                                <div className="space-y-8 animate-fade-in max-w-5xl mx-auto">
                                    <div className="flex justify-between items-center mb-2">
                                        <h2 className="text-2xl font-bold text-white">Atlas Prime Center</h2>
                                        <div className={`status-badge ${data.status.running ? 'status-online' : 'status-offline'}`}>
                                            <span className="w-2 h-2 rounded-full bg-current"></span>
                                            {data.status.running ? 'ENGINE ONLINE' : 'ENGINE OFFLINE'}
                                        </div>
                                    </div>

                                    {/* Main Engine Toggle */}
                                    <div className="glass-panel p-8 flex flex-col items-center text-center">
                                        <button
                                            onClick={toggleEngine}
                                            className={`dv-btn w-full max-w-md h-[60px] text-[18px] font-[800] tracking-widest uppercase transition-transform active:scale-95 ${data.status.running ? 'dv-btn-red' : 'dv-btn-green'
                                                }`}
                                        >
                                            {data.status.running ? '🛑 STOP ENGINE' : '⚡ START ATLAS ENGINE'}
                                        </button>
                                        <p className="mt-4 text-xs text-gray-500 font-bold uppercase tracking-widest">
                                            Autonomous High-Frequency Execution
                                        </p>
                                    </div>

                                    {/* Strategy Settings */}
                                    <div className="glass-panel p-8">
                                        <h3 className="text-md font-bold text-white uppercase mb-6 flex items-center gap-2">
                                            <LucideIcon name="sliders-horizontal" size={16} /> Configuration
                                        </h3>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div>
                                                <label className="text-[10px] text-gray-500 font-bold uppercase mb-2 block">Market Group</label>
                                                <div className="flex rounded-md overflow-hidden border border-[#333]">
                                                    {['RBI (Range)', 'VOC (550)', 'ALL (RBI + VOC)'].map(opt => (
                                                        <button
                                                            key={opt}
                                                            onClick={() => updateSettings({ ...data.settings, cb_group: opt })}
                                                            className={`flex-1 py-3 text-xs font-bold transition-colors ${data.settings.cb_group === opt ? 'bg-[#4B91F7] text-white' : 'bg-[#121212] text-gray-400 hover:bg-[#1E1E1E]'
                                                                }`}
