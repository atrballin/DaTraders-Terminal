                                                        >
                                                            {opt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-[10px] text-gray-500 font-bold uppercase mb-2 block">Risk Protection</label>
                                                <div className="bg-[#1A1C23] p-4 rounded-lg border border-[#333] text-center">
                                                    <div className="text-[#00E676] font-bold text-xs uppercase tracking-widest">Balance-Based Lot Lock enabled</div>
                                                    <div className="text-[9px] text-gray-500 mt-1 uppercase">Volume is automatically managed by Atlas Engine</div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-8 pt-8 border-t border-[#333] grid grid-cols-1 md:grid-cols-2 gap-8">
                                            {data.account.balance >= 100 && (
                                                <div className="flex items-center justify-between bg-[#121212] p-4 rounded-lg border border-[#333] animate-fade-in">
                                                    <div>
                                                        <div className="text-sm font-bold text-gray-200">Soft Stop Loss</div>
                                                        <div className="text-[10px] text-gray-500 uppercase">Automated Account Guard</div>
                                                    </div>
                                                    <button
                                                        onClick={() => updateSettings({ ...data.settings, use_soft_stop: !data.settings.use_soft_stop })}
                                                        className={`w-12 h-6 rounded-full relative transition-colors ${data.settings.use_soft_stop ? 'bg-green-500' : 'bg-gray-700'}`}
                                                    >
                                                        <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${data.settings.use_soft_stop ? 'left-7' : 'left-1'}`}></div>
                                                    </button>
                                                </div>
                                            )}

                                            <div>
                                                <label className="text-[10px] text-gray-500 font-bold uppercase mb-2 block">Max Trades / Day</label>
                                                <input
                                                    type="number"
                                                    className="dv-input w-full"
                                                    value={data.settings.max_trades_day}
                                                    onChange={e => updateSettings({ ...data.settings, max_trades_day: parseInt(e.target.value) })}
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Live Scan Results */}
                                    {data.scanResults && (
                                        <div className="glass-panel p-6 bg-[#111] border border-[#333] mb-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <h4 className="text-[12px] font-bold text-white uppercase flex items-center gap-2">
                                                    <LucideIcon name="activity" size={14} className="text-blue-400" />
                                                    Live Market Scanner
                                                </h4>
                                                <span className="text-[10px] text-gray-500 font-mono bg-[#1a1a1a] px-2 py-1 rounded border border-[#333]">
                                                    {data.scanResults.last_scan ? `UPDATED: ${data.scanResults.last_scan.split('T')[1].split('.')[0]}` : 'WAITING FOR PULSE...'}
                                                </span>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                                {data.scanResults?.signals && Object.keys(data.scanResults.signals).length > 0 ? (
                                                    Object.keys(data.scanResults.signals).map(sym => {
                                                        const sig = data.scanResults.signals[sym];
                                                        // Fallback for types since API might return varying structures
                                                        const risk = typeof sig.spike_risk === 'number' ? sig.spike_risk : 0;
                                                        const signal = sig.signal || 'NONE';
                                                        const reason = sig.reason || '';

                                                        return (
                                                            <div key={sym} className="bg-[#1a1a1a] p-3 rounded border border-[#333] hover:border-[#4B91F7] transition-colors group">
                                                                <div className="flex justify-between items-center mb-2">
                                                                    <span className="font-bold text-gray-200 text-xs group-hover:text-white transition-colors">{sym}</span>
                                                                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${signal === 'BUY' ? 'bg-green-900 text-green-400 border border-green-800' :
                                                                        signal === 'SELL' ? 'bg-red-900 text-red-400 border border-red-800' :
                                                                            'bg-gray-800 text-gray-500 border border-gray-700'
                                                                        }`}>
                                                                        {signal}
                                                                    </span>
                                                                </div>

                                                                <div className="mb-2">
                                                                    <div className="flex justify-between text-[9px] text-gray-500 mb-1 font-mono">
                                                                        <span>TREND STRENGTH</span>
                                                                        <span className={risk === 100 ? 'text-blue-400 font-bold' : risk === 75 ? 'text-blue-300 font-bold' : risk === 0 ? 'text-red-400 font-bold' : risk === 25 ? 'text-red-300 font-bold' : 'text-gray-400'}>
                                                                            {risk === 100 ? 'STRONG UP' : risk === 75 ? 'WEAK UP' : risk === 0 ? 'STRONG DOWN' : risk === 25 ? 'WEAK DOWN' : 'NEUTRAL'}
                                                                        </span>
                                                                    </div>
                                                                    <div className="w-full h-1.5 bg-gray-900 rounded-full overflow-hidden border border-[#333]">
                                                                        <div
                                                                            className={`h-full transition-all duration-500 ${risk >= 75 ? 'bg-blue-500 shadow-[0_0_5px_#3b82f6]' : risk <= 25 ? 'bg-red-500 shadow-[0_0_5px_#ef4444]' : 'bg-gray-500'}`}
                                                                            style={{ width: `${Math.min(risk, 100)}%` }}
                                                                        ></div>
                                                                    </div>
                                                                </div>

                                                                <div className="text-[9px] text-gray-500 truncate border-t border-[#222] pt-2 mt-2" title={reason}>
                                                                    {reason || 'No signal data'}
                                                                </div>
                                                            </div>
                                                        );
                                                    })
                                                ) : (
                                                    <div className="col-span-3 text-center text-gray-600 text-[10px] py-8 italic border border-dashed border-[#333] rounded">
                                                        Engine is initializing or waiting for market data...
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Telemetry */}
                                    <div className="glass-panel p-6 bg-[#111] border-dashed border-[#333]">
                                        <h4 className="text-[11px] font-bold text-gray-500 uppercase mb-4">Real-time Telemetry</h4>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-mono text-gray-400">
                                            <div>SYMBOLS: <span className="text-white">{(data.status?.symbols?.length || 0)}</span></div>
                                            <div>ZMQ PORT: <span className="text-white">5555</span></div>
                                            <div>ENGINE: <span className="text-white">v{data.status.engine_version}</span></div>
                                            <div>LATENCY: <span className="text-green-400">Low</span></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'NEWS' && (
                                <div className="animate-fade-in space-y-4">
                                    <h2 className="text-2xl font-bold text-white mb-6">Forex Intel: FXStreet Feed</h2>
                                    {(data.news || []).map((item, i) => (
                                        <div key={i} className="glass-panel p-5 border-l-4 border-l-[#4B91F7]">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-[10px] font-bold text-gray-500 uppercase">{item.publisher} | {item.publishedAt}</span>
                                            </div>
                                            <h3 className="font-bold text-white text-md mb-2">{item.title}</h3>
                                            <p className="text-sm text-gray-400 mb-3">{item.description}</p>
                                            <a href={item.link} target="_blank" className="text-[11px] font-bold text-[#4B91F7] hover:underline">READ FULL ARTICLE →</a>
                                        </div>
                                    ))}
                                    {data.news.length === 0 && <div className="text-gray-500 italic">No news feed available.</div>}
                                </div>
                            )}

                            {activeTab === 'CALENDAR' && (
                                <div className="animate-fade-in space-y-4">
                                    <h2 className="text-2xl font-bold text-white mb-6">Economic Calendar</h2>
                                    {(data.calendar || []).map((ev, i) => (
                                        <div key={i} className="glass-panel p-4 flex items-center justify-between">
                                            <div>
                                                <div className="text-[10px] font-bold text-gray-500 uppercase">{ev.formatted_date || ev.Date}</div>
                                                <div className="font-bold text-white">{ev.Event}</div>
                                                <div className="text-xs text-gray-400">{ev.Country}</div>
                                            </div>
                                            <div className="text-right">
                                                <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${ev.Impact === 'High' ? 'bg-red-900 text-red-200' : 'bg-yellow-900 text-yellow-200'}`}>
                                                    {ev.Impact} Impact
                                                </span>
                                                <div className="text-xs font-mono mt-1 text-gray-500">FC: {ev.Forecast} | PREV: {ev.Previous}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Toast Notifications */}
                    <div className="fixed bottom-6 right-6 flex flex-col gap-2 z-50 pointer-events-none">
                        {(notifications || []).map((n) => (
                            <div key={n.id} className="bg-white text-black px-6 py-4 rounded-xl shadow-2xl border border-gray-200 min-w-[300px] animate-fade-in-up pointer-events-auto relative">
                                <button
                                    onClick={() => setNotifications(prev => prev.filter(note => note.id !== n.id))}
                                    className="absolute top-2 right-2 text-gray-400 hover:text-black transition-colors"
                                >
                                    <LucideIcon name="x" size={14} />
                                </button>
                                <div className="font-bold text-sm mb-1">{n.type}</div>
                                <div className="text-xs text-gray-600">{n.reason}</div>
                                <div className="text-[10px] text-gray-400 mt-2 font-mono">{n.symbol} @ {n.price}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
